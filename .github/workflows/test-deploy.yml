name: Test deployment

on:
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  test-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run build
